services:
    nginx:
        build:
            context: docker/nginx
        ports:
            -   "80:80"
        volumes:
            -   ./:/app
        depends_on:
            -   php-fpm

    php-fpm:
        build:
            context: docker/php-fpm
        volumes:
            -   ./:/app
        depends_on:
            -   mysql

    php-cli:
        build:
            context: docker/php-cli
        volumes:
            -   ./:/app
        depends_on:
            -   mysql

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: u1656040_ot-doc
            MYSQL_USER: u1656040_default
            MYSQL_PASSWORD: 3EWd6AD52aoYwCWp
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
            - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
    db_data:
